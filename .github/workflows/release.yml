name: Release Builder

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: folio-cli-linux
            asset_name: folio-cli-linux
          - os: windows-latest
            artifact_name: folio_cli.exe
            asset_name: folio_cli.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Compile Windows executable
        if: matrix.os == 'windows-latest'
        run: dart compile exe bin/folio_cli.dart -o ${{ matrix.artifact_name }}

      - name: Compile Linux executable
        if: matrix.os == 'ubuntu-latest'
        run: dart compile exe bin/folio_cli.dart -o ${{ matrix.artifact_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
