name: Release Builder

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: folio-cli-linux
            asset_name: folio-cli-linux
          - os: windows-latest
            artifact_name: folio-cli.exe
            asset_name: folio-cli.exe
          - os: macos-latest
            artifact_name: folio-cli-macos
            asset_name: folio-cli-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Compile Windows executable
        if: matrix.os == 'windows-latest'
        run: dart compile exe bin/folio_cli.dart --obfuscate --save-obfuscation-map=obfuscation-windows.map -o ${{ matrix.artifact_name }}

      - name: Compile Linux executable & Create .deb package
        if: matrix.os == 'ubuntu-latest'
        run: |
          dart compile exe bin/folio_cli.dart --obfuscate --save-obfuscation-map=obfuscation-linux.map -o ${{ matrix.artifact_name }}
          
          VERSION=${GITHUB_REF_NAME#v}
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then VERSION="1.0.0"; fi
          
          mkdir -p deb_pkg/usr/bin
          cp ${{ matrix.artifact_name }} deb_pkg/usr/bin/folio-cli
          chmod +x deb_pkg/usr/bin/folio-cli
          
          mkdir -p deb_pkg/DEBIAN
          cat <<EOF > deb_pkg/DEBIAN/control
          Package: folio-cli
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Solti Csongor Péter <csps0@users.noreply.github.com>
          Description: Terminal-based client for the Hungarian Kréta electronic school diary system.
          EOF
          
          dpkg-deb --build deb_pkg folio-cli_${VERSION}_amd64.deb

      - name: Upload .deb for APT Repo
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: "*.deb"
          retention-days: 1

      - name: Compile macOS executable
        if: matrix.os == 'macos-latest'
        run: dart compile exe bin/folio_cli.dart --obfuscate --save-obfuscation-map=obfuscation-macos.map -o ${{ matrix.artifact_name }}

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            ${{ matrix.artifact_name }}
            *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  apt-repo:
    name: Build APT Repository
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download .deb packages
        uses: actions/download-artifact@v4
        with:
          name: debian-package
          path: deb_packages
          
      - name: Generate APT Repository
        uses: smeinecke/apt-repo-action@v2.1.4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo_supported_arch: amd64
          repo_supported_version: stable
          file: deb_packages/*.deb
          file_target_version: stable
          private_key: ${{ secrets.APT_SIGNING_KEY }}
