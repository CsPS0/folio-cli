name: Release Builder

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: folio-cli-linux
            asset_name: folio-cli-linux
          - os: windows-latest
            artifact_name: folio-cli.exe
            asset_name: folio-cli.exe
          - os: macos-latest
            artifact_name: folio-cli-macos
            asset_name: folio-cli-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Compile Windows executable
        if: matrix.os == 'windows-latest'
        run: dart compile exe bin/folio_cli.dart -o ${{ matrix.artifact_name }}

      - name: Compile Linux executable & Create .deb package
        if: matrix.os == 'ubuntu-latest'
        run: |
          dart compile exe bin/folio_cli.dart -o ${{ matrix.artifact_name }}
          
          VERSION=${GITHUB_REF_NAME#v}
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then VERSION="1.0.0"; fi
          
          mkdir -p deb_pkg/usr/bin
          cp ${{ matrix.artifact_name }} deb_pkg/usr/bin/folio-cli
          chmod +x deb_pkg/usr/bin/folio-cli
          
          mkdir -p deb_pkg/DEBIAN
          cat <<EOF > deb_pkg/DEBIAN/control
          Package: folio-cli
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: Solti Csongor Péter <csps0@users.noreply.github.com>
          Description: Terminal-based client for the Hungarian Kréta electronic school diary system.
          EOF
          
          dpkg-deb --build deb_pkg folio-cli_${VERSION}_amd64.deb

      - name: Compile macOS executable
        if: matrix.os == 'macos-latest'
        run: dart compile exe bin/folio_cli.dart -o ${{ matrix.artifact_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            ${{ matrix.artifact_name }}
            *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
