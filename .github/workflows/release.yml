name: Release Builder

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: folio-cli-linux
            asset_name: folio-cli-linux
          - os: windows-latest
            artifact_name: folio-cli.exe
            asset_name: folio-cli.exe
          - os: macos-latest
            artifact_name: folio-cli-macos
            asset_name: folio-cli-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Compile Windows executable
        if: matrix.os == 'windows-latest'
        run: dart compile exe bin/folio_cli.dart -S debug-info-windows.map -o ${{ matrix.artifact_name }}

      - name: Compile Linux executable & Create .deb package
        if: matrix.os == 'ubuntu-latest'
        run: |
          dart compile exe bin/folio_cli.dart -S debug-info-linux.map -o ${{ matrix.artifact_name }}
          
          VERSION=${GITHUB_REF_NAME#v}
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then VERSION="1.0.0"; fi
          
          mkdir -p deb_pkg/usr/bin
          cp ${{ matrix.artifact_name }} deb_pkg/usr/bin/folio-cli
          chmod +x deb_pkg/usr/bin/folio-cli
          
          mkdir -p deb_pkg/DEBIAN
          cat <<EOF > deb_pkg/DEBIAN/control
          Package: folio-cli
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Solti Csongor Péter <csps0@users.noreply.github.com>
          Description: Terminal-based client for the Hungarian Kréta electronic school diary system.
          EOF
          
          dpkg-deb --build deb_pkg folio-cli_${VERSION}_amd64.deb

      - name: Upload .deb for APT Repo
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: "*.deb"
          retention-days: 1

      - name: Compile macOS executable
        if: matrix.os == 'macos-latest'
        run: dart compile exe bin/folio_cli.dart -S debug-info-macos.map -o ${{ matrix.artifact_name }}

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: ${{ matrix.artifact_name }}
          retention-days: 1

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            ${{ matrix.artifact_name }}
            *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  apt-repo:
    name: Build APT Repository
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download .deb packages
        uses: actions/download-artifact@v4
        with:
          name: debian-package
          path: deb_packages
          
      - name: Generate APT Repository
        uses: smeinecke/apt-repo-action@v2.1.4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo_supported_arch: amd64
          repo_supported_version: stable
          file: deb_packages/*.deb
          file_target_version: stable
          private_key: ${{ secrets.APT_SIGNING_KEY }}

  update-manifests:
    name: Auto-update Scoop & Homebrew Manifests
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: binary-windows-latest
          path: bin-win

      - name: Download Linux Binary
        uses: actions/download-artifact@v4
        with:
          name: binary-ubuntu-latest
          path: bin-lin

      - name: Download macOS Binary
        uses: actions/download-artifact@v4
        with:
          name: binary-macos-latest
          path: bin-mac

      - name: Update Manifests
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then VERSION="1.2.0"; fi
          
          WIN_HASH=$(sha256sum bin-win/folio-cli.exe | awk '{print $1}')
          LIN_HASH=$(sha256sum bin-lin/folio-cli-linux | awk '{print $1}')
          MAC_HASH=$(sha256sum bin-mac/folio-cli-macos | awk '{print $1}')
          
          export VERSION WIN_HASH LIN_HASH MAC_HASH
          
          python3 - << 'EOF'
          import os, json, re
          
          version = os.environ['VERSION']
          win_hash = os.environ['WIN_HASH']
          lin_hash = os.environ['LIN_HASH']
          mac_hash = os.environ['MAC_HASH']
          
          # 1. Update Scoop manifest
          scoop_path = 'bucket/folio-cli.json'
          with open(scoop_path, 'r', encoding='utf-8') as f:
              scoop_data = json.load(f)
          
          scoop_data['version'] = version
          scoop_data['architecture']['64bit']['url'] = f"https://github.com/CsPS0/folio-cli/releases/download/v{version}/folio-cli.exe"
          scoop_data['architecture']['64bit']['hash'] = win_hash
          
          with open(scoop_path, 'w', encoding='utf-8') as f:
              json.dump(scoop_data, f, indent=4)
          
          # 2. Update Homebrew formula
          brew_path = 'Formula/folio-cli.rb'
          with open(brew_path, 'r', encoding='utf-8') as f:
              content = f.read()
          
          content = re.sub(r'version \".*?\"', f'version "{version}"', content)
          content = re.sub(r'releases/download/v.*/folio-cli-macos', f'releases/download/v{version}/folio-cli-macos', content)
          content = re.sub(r'releases/download/v.*/folio-cli-linux', f'releases/download/v{version}/folio-cli-linux', content)
          
          content = re.sub(r'(on_macos do\s+url.*?\s+sha256\s+\")[a-f0-9]+(\")', r'\g<1>' + mac_hash + r'\g<2>', content, flags=re.DOTALL)
          content = re.sub(r'(on_linux do\s+url.*?\s+sha256\s+\")[a-f0-9]+(\")', r'\g<1>' + lin_hash + r'\g<2>', content, flags=re.DOTALL)
          
          with open(brew_path, 'w', encoding='utf-8') as f:
              f.write(content)
          
          # 3. Update AUR PKGBUILD
          aur_path = 'packaging/PKGBUILD'
          with open(aur_path, 'r', encoding='utf-8') as f:
              content = f.read()
          
          content = re.sub(r'pkgver=.*', f'pkgver={version}', content)
          content = re.sub(r'pkgrel=.*', 'pkgrel=1', content)
          content = re.sub(r'sha256sums=\(\'.*?\'\)', f"sha256sums=('{lin_hash}')", content)
          
          with open(aur_path, 'w', encoding='utf-8') as f:
              f.write(content)
          EOF
          
          # Configure Git and Push
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/folio-cli.json Formula/folio-cli.rb packaging/PKGBUILD
          git commit -m "chore: auto-update scoop, homebrew, and aur manifests to v$VERSION [skip ci]"
          git push origin HEAD:main
